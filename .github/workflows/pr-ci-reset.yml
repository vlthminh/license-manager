name: PR CI Reset on New Commits

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  pull-requests: write
  issues: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      # A new commit invalidates whatever the last CI run checked, so the
      # ci-ready label and the checkbox both get reset — the box has to be
      # re-checked to run CI again before merging.
      - name: Remove the ci-ready label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label ci-ready || true

      - name: Uncheck the CI checkbox comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          comment_id=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Run CI")))][-1].id')

          if [ -n "$comment_id" ]; then
            gh api "repos/$REPO/issues/comments/$comment_id" --jq .body > /tmp/comment_body.txt
            sed -i 's/\[x\] Run CI/[ ] Run CI/' /tmp/comment_body.txt
            gh api "repos/$REPO/issues/comments/$comment_id" -X PATCH -F body=@/tmp/comment_body.txt
          fi
