name: PR CI Trigger (checkbox)

on:
  issue_comment:
    types: [edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  trigger:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, '[x] Run CI')
    runs-on: ubuntu-latest
    steps:
      # Re-applying the same label doesn't fire a new "labeled" event, so
      # remove it first (ignoring the error if it wasn't present) to make
      # re-checking the box after new commits trigger a fresh CI run.
      - name: Toggle the ci-ready label to re-trigger CI on this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label ci-ready || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label ci-ready
