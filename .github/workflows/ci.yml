name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # On a PR, this only fires when a label is added, and only actually runs
    # for the "ci-ready" label specifically (set by checking the box in the
    # bot's PR comment) — new commits never auto-run this job. See
    # pr-ci-reset.yml, which strips the label on every new commit so the box
    # has to be re-checked before merging.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci-ready')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: license_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/license_manager_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run RSpec
        run: bundle exec rspec

      - name: Run Rubocop
        run: bundle exec rubocop
